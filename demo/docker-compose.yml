services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acme
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./packages/backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://acme:secret@postgres:5432/acme
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./packages/backend:/app
      - /app/node_modules

volumes:
  postgres_data:
