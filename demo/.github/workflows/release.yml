name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish packages
        run: pnpm publish -r --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
