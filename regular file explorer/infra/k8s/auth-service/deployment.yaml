apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: acme-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/acme/auth-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef:
                name: auth-service-secrets
